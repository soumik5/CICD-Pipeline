name: GitHub Actions CI/CD Pipeline Flask App

on:
  push:
    branches:
      - staging
      - main
    tags:
      - 'v*'

jobs:
  install-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Create virtual environment and install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Upload Python environment artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-env
          path: .venv
          include-hidden-files: true

  run-tests:
    needs: install-dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download Python environment artifact
        uses: actions/download-artifact@v4
        with:
          name: python-env
          path: .venv
          include-hidden-files: true

      - name: Set permissions for virtual environment
        run: |  
          chmod -R 777 .venv

      - name: Create .env file
        run: |
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          pytest -v --collect-only

      - name: Upload Python environment for deploy
        uses: actions/upload-artifact@v4
        with:
          name: python-env-for-deploy
          path: .venv
          include-hidden-files: true

  deploy-to-staging:
    if: github.ref == 'refs/heads/staging'
    needs: run-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download Python environment artifact from tests
        uses: actions/download-artifact@v4
        with:
          name: python-env-for-deploy
          path: .venv
          include-hidden-files: true

      - name: Set permissions for virtual environment
        run: |  
          chmod -R 777 .venv

      - name: Create .env file
        run: |
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env

      - name: Deploy to Staging Server
        run: |
          source .venv/bin/activate
          nohup python app.py &
          sleep 5
          curl -fsS http://localhost:5000
    
  deploy-to-main:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - name: Download Python environment artifact from tests
        uses: actions/download-artifact@v4
        with:
          name: python-env-for-deploy
          path: .venv
          include-hidden-files: true

      - name: copy artifact to ec2
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: ".venv"
          target: "/python-app"

      - name: setup ssh agent
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}
      
      - name: deploy to my ec2 and run the flask app
        run: |
          ssh -o "strictHostKeyChecking=no" ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
          "
          sudo systemctl restart flaskapp
          sudo systemctl status flaskapp --no-pager
          sleep 5
          ps -ef | grep app.py | grep -v grep
          "

        
    
